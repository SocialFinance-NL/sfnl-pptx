<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="sfnl.css"></head>
<body>
  <header class="chrome-header">
    <h1 class="slide-title">CHART EN CONCLUSIE</h1>
    <p class="slide-subtitle">INSTROOM GROEIT SNELLER DAN UITSTROOM</p>
    <div class="dash"></div>
  </header>
  <main class="content">
    <div class="col" style="flex: 2.3;">
      <div id="chart-main" class="placeholder" style="flex: 1;"></div>
    </div>
    <div class="col" style="flex: 1;">
      <div class="frame-band">
        <p class="label" style="color: #FEFFFF;">LEZING</p>
        <p class="body-dense">Capaciteit blijft de rem op resultaat.</p>
      </div>
      <div class="verdict-box" style="flex: 1;">
        <p class="label" style="color: #FEFFFF;">CONCLUSIE</p>
        <p class="body-large">Opschalen kan, maar alleen met vaste uitstroomnorm.</p>
      </div>
    </div>
  </main>
</body>
</html>
