<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="sfnl.css"></head>
<body>
  <header class="chrome-header">
    <h1 class="slide-title">KPI'S IN KADER</h1>
    <p class="slide-subtitle">PILOTRESULTAAT EN SCHAALVRAAG</p>
    <div class="dash"></div>
  </header>
  <main class="content">
    <div class="frame-sidebar">
      <p class="label" style="color: #FEFFFF;">LENS</p>
      <p class="body-dense">Meet eerst instroom, dan uitstroom.</p>
    </div>
    <div class="col" style="flex: 2;">
      <div class="frame-band">
        <p class="body-large">De pilot wint tijd zodra uitstroom zichtbaar wordt.</p>
      </div>
      <div class="col" style="flex-direction: row; gap: 10pt;">
        <div class="frame-panel royal" style="flex: 1;">
          <p class="big-number">28</p>
          <p class="label">INSTROOM</p>
          <p class="body-dense">Maand 2.</p>
        </div>
        <div class="frame-panel emerald" style="flex: 1;">
          <p class="big-number" style="color: var(--sfnl-emerald);">4</p>
          <p class="label">UITSTROOM</p>
          <p class="body-dense">Eerste sluiting.</p>
        </div>
        <div class="verdict-box" style="flex: 1;">
          <p class="big-number" style="color: #FEFFFF;">14%</p>
          <p class="label" style="color: #FEFFFF;">AANDEEL</p>
          <p class="body-dense">Nog klein, wel meetbaar.</p>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
