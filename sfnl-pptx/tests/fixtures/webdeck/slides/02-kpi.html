<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="sfnl.css"></head>
<body>
  <header class="chrome-header">
    <h1 class="slide-title">DRIE CIJFERS DRAGEN HET RESULTAAT</h1>
    <p class="slide-subtitle">FIXTURE VOOR DE BUILDTESTS</p>
    <div class="dash"></div>
  </header>
  <main class="content">
    <div class="frame-sidebar">
      <p class="label" style="color: #FEFFFF;">RESULTAAT</p>
      <p class="body-dense">Drie signalen vormen samen de test.</p>
    </div>
    <div class="col" style="flex: 1.9;">
      <div class="frame-band">
        <p class="body-large">De businesscase draait op minder uitval.</p>
      </div>
      <div class="col" style="flex-direction: row; gap: 10pt;">
        <div class="frame-panel royal" style="flex: 1;">
          <p class="big-number">31%</p>
          <p class="label">MINDER UITVAL</p>
          <p class="body-dense">Eerste effectmeting.</p>
        </div>
        <div class="frame-panel emerald" style="flex: 1;">
          <p class="big-number" style="color: var(--sfnl-emerald);">124</p>
          <p class="label">TRAJECTEN</p>
          <p class="body-dense">Bereikt in pilot.</p>
        </div>
        <div class="verdict-box" style="flex: 1;">
          <p class="big-number" style="color: #FEFFFF;">EUR 0,9M</p>
          <p class="label" style="color: #FEFFFF;">BESPARING</p>
          <p class="body-dense">Raming op jaarbasis.</p>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
