<!DOCTYPE html>
<html><head><style>
  body { width: 720pt; height: 405pt; margin: 0; position: relative; }
  /* Table bottom edge lands within 0.3in (21.6pt) of the 405pt slide bottom,
     without overflowing the body itself. */
  table { position: absolute; left: 40pt; top: 358pt; width: 400pt; border-collapse: collapse; }
  td { font-size: 11pt; padding: 4pt; }
</style></head>
<body>
  <table>
    <tr><td>Rij een</td><td>waarde</td></tr>
    <tr><td>Rij twee</td><td>waarde</td></tr>
  </table>
</body></html>
