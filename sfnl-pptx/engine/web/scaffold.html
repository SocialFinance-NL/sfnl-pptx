<!DOCTYPE html>
<html>
<!-- SFNL slide scaffold — kopieer per slide, canvas 720pt × 405pt.
     Titels/subtitels ALTIJD in ALL CAPS typen (CSS text-transform telt niet in de conversie).
     Logo + paginanummer NIET in HTML zetten: build_deck.js voegt die native toe. -->
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="sfnl.css">
</head>
<body>
  <header class="chrome-header">
    <h1 class="slide-title">ACTION TITLE IN ALL CAPS</h1>
    <p class="slide-subtitle">OPTIONELE SUBTITEL — VERWIJDER DEZE REGEL ALS ER GEEN IS</p>
    <div class="dash"></div>
  </header>
  <main class="content">
    <div class="frame-sidebar">
      <p class="label" style="color: #FEFFFF;">KADER</p>
      <p>Gebruik dit vlak voor de centrale lens of conclusie.</p>
    </div>
    <div class="col">
      <div class="frame-panel royal" style="flex: 1;">
        <p>Vrije compositie: vervang dit door een volledige exhibit met heldere kaders, grotere Lato-tekst en semantische kleurvlakken.</p>
      </div>
    </div>
  </main>
</body>
</html>
